services:
  - type: web
    name: adfrio-api
    env: node
    rootDir: server
    plan: free
    healthCheckPath: /health
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: postmessage
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: YOUTUBE_COOKIE
        sync: false
      - key: PIPED_INSTANCES
        value: https://api.piped.private.coffee,https://pipedapi.kavin.rocks,https://piped.video/api,https://piped-api.garudalinux.org
